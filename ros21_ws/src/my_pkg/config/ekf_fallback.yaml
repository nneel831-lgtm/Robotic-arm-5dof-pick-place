ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: false
    publish_tf: true
    odom_frame: odom
    base_link_frame: camera_link
    world_frame: odom

    odom0: /odom_scaled
    odom0_config: [true,  true,  true,
                    false, false, false,
                    true,  true,  true,
                    false, false, true,
                    false, false, false]
    odom0_differential: false
    odom0_relative: false

    imu0: /camera/camera/imu
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
